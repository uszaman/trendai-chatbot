<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendAI Chatbot</title>
<style>
  :root { --bg:#0f172a; --panel:#1e293b; --accent:#38bdf8; --user:#334155; --bot:#0e7490; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:#e2e8f0;
         height:100vh; display:flex; flex-direction:column; align-items:center; }
  header { padding:16px; font-weight:600; font-size:18px; color:var(--accent); }
  #chat { flex:1; width:100%; max-width:640px; overflow-y:auto; padding:16px; }
  .msg { margin:8px 0; padding:10px 14px; border-radius:12px; max-width:80%; line-height:1.4; white-space:pre-wrap; }
  .user { background:var(--user); margin-left:auto; }
  .bot  { background:var(--bot); margin-right:auto; }
  #bar { display:flex; gap:8px; width:100%; max-width:640px; padding:12px; }
  #input { flex:1; padding:12px; border-radius:8px; border:1px solid #334155; background:var(--panel); color:#e2e8f0; }
  #send { padding:12px 20px; border:0; border-radius:8px; background:var(--accent); color:#0f172a; font-weight:600; cursor:pointer; }
  #send:disabled { opacity:.5; cursor:default; }
</style>
</head>
<body>
  <header>TrendAI Chatbot</header>
  <div id="chat"></div>
  <div id="bar">
    <input id="input" placeholder="Type a message..." autocomplete="off" />
    <button id="send">Send</button>
  </div>
<script>
  // Backend URL is injected at deploy time; defaults to same-origin /api/chat
  const API = window.API_URL || "/api/chat";
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const send = document.getElementById("send");

  function addMsg(text, cls) {
    const d = document.createElement("div");
    d.className = "msg " + cls;
    d.textContent = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
  }

  async function submit() {
    const message = input.value.trim();
    if (!message) return;
    addMsg(message, "user");
    input.value = "";
    send.disabled = true;
    try {
      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });
      const data = await res.json();
      addMsg(data.reply || data.detail || "(no response)", "bot");
    } catch (e) {
      addMsg("Error reaching server.", "bot");
    } finally {
      send.disabled = false;
      input.focus();
    }
  }

  send.onclick = submit;
  input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
</script>
</body>
</html>
