<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendAI Chatbot</title>
<style>
  :root { --bg:#0f172a; --panel:#1e293b; --accent:#38bdf8; --user:#334155; --bot:#0e7490; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:#e2e8f0;
         height:100vh; display:flex; flex-direction:column; align-items:center; }
  header { padding:16px; font-weight:600; font-size:18px; color:var(--accent); }
  #chat { flex:1; width:100%; max-width:640px; overflow-y:auto; padding:16px; }
  .msg { margin:8px 0; padding:10px 14px; border-radius:12px; max-width:80%; line-height:1.5; }
  .user { background:var(--user); margin-left:auto; white-space:pre-wrap; }
  .bot  { background:var(--bot); margin-right:auto; }
  .bot p { margin:0 0 8px; }
  .bot p:last-child { margin-bottom:0; }
  .bot ul, .bot ol { margin:6px 0; padding-left:20px; }
  .bot li { margin:3px 0; }
  .bot code { background:rgba(0,0,0,.3); padding:1px 5px; border-radius:4px;
              font-family: ui-monospace, monospace; font-size:.9em; }
  .bot pre { background:rgba(0,0,0,.35); padding:10px; border-radius:8px; overflow-x:auto; margin:8px 0; }
  .bot pre code { background:none; padding:0; }
  .bot h3 { margin:10px 0 6px; font-size:1.05em; }
  .bot a { color:#bae6fd; }
  #bar { display:flex; gap:8px; width:100%; max-width:640px; padding:12px; }
  #input { flex:1; padding:12px; border-radius:8px; border:1px solid #334155; background:var(--panel); color:#e2e8f0; }
  #send { padding:12px 20px; border:0; border-radius:8px; background:var(--accent); color:#0f172a; font-weight:600; cursor:pointer; }
  #send:disabled { opacity:.5; cursor:default; }
</style>
</head>
<body>
  <header>TrendAI Chatbot</header>
  <div id="chat"></div>
  <div id="bar">
    <input id="input" placeholder="Type a message..." autocomplete="off" />
    <button id="send">Send</button>
  </div>
<script>
  const API = window.API_URL || "/api/chat";
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const send = document.getElementById("send");

  // LLM output is untrusted: escape all HTML first, then apply an explicit
  // markdown subset. Never inject the raw model response into the DOM.
  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  function renderMarkdown(src) {
    let t = escapeHtml(src);

    const blocks = [];
    t = t.replace(/[\w]*\n?([\s\S]*?)/g, (_, code) => {
      blocks.push(code.replace(/\n$/, ""));
      return "\u0000BLOCK" + (blocks.length - 1) + "\u0000";
    });

    t = t.replace(/([^\n]+)`/g, "<code>$1</code>");
    t = t.replace(/\\([^]+)\\*/g, "<strong>$1</strong>");
    t = t.replace(/(^|[^])\([^\n]+)\/g, "$1<em>$2</em>");
    t = t.replace(/^#{1,6}\s+(.+)$/gm, "<h3>$1</h3>");
    t = t.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
                  '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

    const lines = t.split("\n");
    let html = "", list = null, para = [];
    const flushPara = () => { if (para.length) { html += "<p>" + para.join("<br>") + "</p>"; para = []; } };
    const flushList = () => { if (list) { html += "</" + list + ">"; list = null; } };

    for (const line of lines) {
      const ul = line.match(/^\s*[-+]\s+(.)$/);
      const ol = line.match(/^\s*\d+[.)]\s+(.*)$/);
      if (ul || ol) {
        flushPara();
        const want = ul ? "ul" : "ol";
        if (list !== want) { flushList(); html += "<" + want + ">"; list = want; }
        html += "<li>" + (ul || ol)[1] + "</li>";
      } else if (line.trim() === "") {
        flushPara(); flushList();
      } else if (/^<h3>/.test(line)) {
        flushPara(); flushList(); html += line;
      } else {
        flushList(); para.push(line);
      }
    }
    flushPara(); flushList();

    html = html.replace(/\u0000BLOCK(\d+)\u0000/g, (_, i) => "<pre><code>" + blocks[i] + "</code></pre>");
    return html;
  }

  function addMsg(text, cls) {
    const d = document.createElement("div");
    d.className = "msg " + cls;
    if (cls === "bot") {
      d.innerHTML = renderMarkdown(text);
    } else {
      d.textContent = text;
    }
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
  }

  async function submit() {
    const message = input.value.trim();
    if (!message) return;
    addMsg(message, "user");
    input.value = "";
    send.disabled = true;
    try {
      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });
      const data = await res.json();
      addMsg(data.reply || data.detail || "(no response)", "bot");
    } catch (e) {
      addMsg("Error reaching server.", "bot");
    } finally {
      send.disabled = false;
      input.focus();
    }
  }

  send.onclick = submit;
  input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
</script>
</body>
</html>
