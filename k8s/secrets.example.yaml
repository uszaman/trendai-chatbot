# EXAMPLE ONLY — do NOT commit real secrets.
# Create these at deploy time with kubectl, e.g.:
#
#   kubectl create secret generic mongo-secret -n chatbot \
#     --from-literal=username=admin \
#     --from-literal=password='CHANGE_ME' \
#     --from-literal=uri='mongodb://admin:CHANGE_ME@mongodb:27017/chatbot?authSource=admin'
#
#   kubectl create secret generic llm-secret -n chatbot \
#     --from-literal=api-key='sk-ant-...'
#
# For production, prefer AWS Secrets Manager + External Secrets Operator,
# or Sealed Secrets, so nothing sensitive ever lives in Git.
apiVersion: v1
kind: Secret
metadata:
  name: mongo-secret
  namespace: chatbot
type: Opaque
stringData:
  username: admin
  password: CHANGE_ME
  uri: "mongodb://admin:CHANGE_ME@mongodb:27017/chatbot?authSource=admin"
---
apiVersion: v1
kind: Secret
metadata:
  name: llm-secret
  namespace: chatbot
type: Opaque
stringData:
  api-key: CHANGE_ME
