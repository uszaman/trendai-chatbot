# Runs mongodump every 24h and uploads the archive to S3.
# Requires IAM: the node/pod role needs s3:PutObject on the backup bucket only.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongodb-backup
  namespace: chatbot
spec:
  schedule: "0 2 * * *"          # 02:00 UTC daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: mongo:7.0
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -e
                  apt-get update -qq && apt-get install -y -qq awscli
                  STAMP=$(date +%Y-%m-%d-%H%M%S)
                  mongodump --uri="$MONGO_URI" --archive=/tmp/dump-$STAMP.gz --gzip
                  aws s3 cp /tmp/dump-$STAMP.gz s3://$BACKUP_BUCKET/mongodb/dump-$STAMP.gz
                  echo "Backup uploaded: dump-$STAMP.gz"
              env:
                - name: MONGO_URI
                  valueFrom: { secretKeyRef: { name: mongo-secret, key: uri } }
                - name: BACKUP_BUCKET
                  value: "trendai-chatbot-backups-uzuz"